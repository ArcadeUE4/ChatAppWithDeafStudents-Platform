version: '3.8'

services:
  # SQL Server Database
  mssql:
    image: mcr.microsoft.com/mssql/server:2025-latest
    container_name: chatapp_mssql

    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: ${MSSQL_SA_PASSWORD:-YourStrong@Password123}
      MSSQL_PID: Express
      MSSQL_TCP_PORT: 1433

    ports:
      - "${SQL_PORT:-1433}:1433"

    volumes:
      - sqldata:/var/opt/mssql/data
      - sqlbackup:/var/opt/mssql/backup
      - sqllog:/var/opt/mssql/log

    networks:
      - chatapp-network

    healthcheck:
      test: 
        - CMD
        - /opt/mssql-tools18/bin/sqlcmd
        - -S
        - localhost
        - -U
        - sa
        - -P
        - ${MSSQL_SA_PASSWORD:-YourStrong@Password123}
        - -Q
        - SELECT 1
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

    restart: unless-stopped

    labels:
      description: "MSSQL Server 2025 for Chat App database"

  # .NET API Service
  api:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        - DOTNET_CONFIGURATION=Release

    container_name: chatapp_api

    depends_on:
      mssql:
        condition: service_healthy

    environment:
      # ASP.NET Core
      ASPNETCORE_ENVIRONMENT: ${ASPNETCORE_ENVIRONMENT:-Production}
      ASPNETCORE_URLS: http://+:8080

      # Database
      ConnectionStrings__DefaultConnection: "Server=mssql;Database=InclusiveChatDB;User Id=sa;Password=${MSSQL_SA_PASSWORD:-YourStrong@Password123};TrustServerCertificate=True;"

      # JWT Configuration
      Jwt__Key: ${JWT_KEY:-dev-key-minimum-32-characters-long-change-this-in-production}
      Jwt__Issuer: ChatAppWithDeafStudents
      Jwt__ExpirationMinutes: 15
      Jwt__ExpirationHours: 24
      Jwt__RefreshTokenExpirationMinutes: 10080

      # CORS Configuration
      Cors__AllowedOrigins: ${CORS_ORIGINS:-http://localhost:3000,http://localhost:5000}

      # Logging
      Logging__LogLevel__Default: ${LOG_LEVEL:-Information}
      Logging__LogLevel__Microsoft.AspNetCore: Warning

      # API Configuration
      Api__RequestTimeoutSeconds: 30
      Api__MaxUploadSizeBytes: 10485760

      # Rate Limiting
      RateLimiting__Enabled: "true"
      RateLimiting__PermitLimit: 100
      RateLimiting__Window: 60

      # Pagination
      Pagination__DefaultPageSize: 50
      Pagination__MaxPageSize: 100

    ports:
      - "${API_PORT:-5000}:8080"

    volumes:
      - applogs:/app/logs

    networks:
      - chatapp-network

    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

    restart: unless-stopped

    labels:
      description: "Chat App API (.NET 10 ASP.NET Core)"
      maintainer: "ArcadeUE4"

  # Optional: Nginx Reverse Proxy (for production-like setup)
  nginx:
    image: nginx:latest
    container_name: chatapp_nginx

    ports:
      - "${NGINX_PORT:-80}:80"
      - "${NGINX_SSL_PORT:-443}:443"

    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro

    depends_on:
      - api

    networks:
      - chatapp-network

    restart: unless-stopped

    labels:
      description: "Nginx reverse proxy for API"

    profiles:
      - prod

# Volumes for data persistence
volumes:
  sqldata:
    driver: local
  sqlbackup:
    driver: local
  sqllog:
    driver: local
  applogs:
    driver: local

# Networks
networks:
  chatapp-network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16